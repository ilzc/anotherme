name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build binaries
        run: |
          VERSION=${GITHUB_REF_NAME}
          LDFLAGS="-s -w -X main.version=${VERSION}"

          GOOS=darwin GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o dist/anotherme-darwin-arm64 .
          GOOS=darwin GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/anotherme-darwin-amd64 .
          GOOS=linux GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/anotherme-linux-amd64 .
          GOOS=windows GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/anotherme-windows-amd64.exe .

      - name: Create checksums
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
