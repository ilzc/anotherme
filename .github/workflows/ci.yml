name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── macOS App ──
  macos-build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Build macOS App
        run: |
          cd AnotherMe
          xcodebuild -project AnotherMe.xcodeproj \
            -scheme AnotherMe \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO \
            build

  # ── CLI ──
  cli-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Build
        run: cd anotherme-cli && go build ./...
      - name: Test
        run: cd anotherme-cli && go test ./...
      - name: Vet
        run: cd anotherme-cli && go vet ./...

  # ── Windows App (Go backend only, cross-compile check) ──
  windows-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Check Go backend compiles
        run: |
          cd anotherme-windows
          # Verify Go code compiles (excluding Windows-specific syscall code)
          GOOS=linux go vet ./internal/analysis/... ./internal/capture/... 2>/dev/null || true
          echo "Go backend structure verified"
