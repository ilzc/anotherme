name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── macOS App ──
  macos-build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode (Swift 6.1+)
        run: |
          echo "Available Xcode versions:"
          ls -d /Applications/Xcode*.app || true
          # Pick the highest 16.x Xcode available (need >= 16.3 for Swift 6.1)
          XCODE=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE" ]; then
            echo "Error: No Xcode 16.x found"
            exit 1
          fi
          echo "Selected: $XCODE"
          sudo xcode-select -s "$XCODE"
          swift --version

      - name: Build macOS App
        run: |
          cd AnotherMe
          xcodebuild -project AnotherMe.xcodeproj \
            -scheme AnotherMe \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO \
            build

  # ── CLI ──
  cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
          cache-dependency-path: anotherme-cli/go.sum
      - name: Vet
        run: cd anotherme-cli && go vet ./...
      - name: Build
        run: cd anotherme-cli && go build ./...
      - name: Test
        run: cd anotherme-cli && go test ./...

  # ── Windows App (Go backend compile check) ──
  windows-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
          cache-dependency-path: anotherme-windows/go.sum
      - name: Verify Go backend compiles
        run: |
          cd anotherme-windows
          GOOS=windows go vet ./...
