name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── macOS App ──
  macos-build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app

      - name: Build macOS App
        run: |
          cd AnotherMe
          xcodebuild -project AnotherMe.xcodeproj \
            -scheme AnotherMe \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO \
            build

  # ── CLI ──
  cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
          cache-dependency-path: anotherme-cli/go.sum
      - name: Vet
        run: cd anotherme-cli && go vet ./...
      - name: Build
        run: cd anotherme-cli && go build ./...
      - name: Test
        run: cd anotherme-cli && go test ./...

  # ── Windows App (Go backend compile check) ──
  windows-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
          cache-dependency-path: anotherme-windows/go.sum
      - name: Verify Go backend compiles
        run: |
          cd anotherme-windows
          GOOS=windows go vet ./...
