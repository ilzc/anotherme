name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  # ── macOS App (.app in .dmg) ──
  release-macos:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode (Swift 6.1+)
        run: |
          echo "Available Xcode versions:"
          ls -d /Applications/Xcode*.app || true
          # Pick the highest 16.x Xcode available (need >= 16.3 for Swift 6.1)
          XCODE=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE" ]; then
            echo "Error: No Xcode 16.x found"
            exit 1
          fi
          echo "Selected: $XCODE"
          sudo xcode-select -s "$XCODE"
          swift --version

      - name: Build macOS App
        run: |
          cd AnotherMe
          xcodebuild -project AnotherMe.xcodeproj \
            -scheme AnotherMe \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Create DMG
        run: |
          APP_PATH="AnotherMe/build/Build/Products/Release/AnotherMe.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Error: AnotherMe.app not found at $APP_PATH"
            echo "Searching for .app..."
            APP_PATH=$(find AnotherMe/build -name "AnotherMe.app" -type d | head -1)
            if [ -z "$APP_PATH" ]; then
              echo "Error: AnotherMe.app not found anywhere"
              exit 1
            fi
          fi
          echo "Found app at: $APP_PATH"
          hdiutil create -volname "AnotherMe" \
            -srcfolder "$APP_PATH" \
            -ov -format UDZO \
            "AnotherMe-${{ github.ref_name }}-macOS.dmg"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: "*.dmg"

  # ── CLI (cross-platform binaries) ──
  release-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
          cache-dependency-path: anotherme-cli/go.sum

      - name: Test
        run: cd anotherme-cli && go test ./...

      - name: Build CLI binaries
        run: |
          cd anotherme-cli
          VERSION="${{ github.ref_name }}"
          LDFLAGS="-s -w -X main.version=${VERSION}"
          mkdir -p dist

          GOOS=darwin  GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o dist/anotherme-cli-darwin-arm64 .
          GOOS=darwin  GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/anotherme-cli-darwin-amd64 .
          GOOS=linux   GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/anotherme-cli-linux-amd64 .
          GOOS=linux   GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o dist/anotherme-cli-linux-arm64 .
          GOOS=windows GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/anotherme-cli-windows-amd64.exe .

      - name: Create checksums
        run: |
          cd anotherme-cli/dist
          sha256sum * > checksums-cli.txt

      - name: Upload CLI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cli-binaries
          path: anotherme-cli/dist/*

  # ── Windows App (Wails build) ──
  # NOTE: Currently optional — Windows app hasn't integrated Wails runtime yet.
  #       This job will be enabled once wails.json and Wails imports are added.
  release-windows:
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.9.2

      - name: Install frontend dependencies
        run: |
          cd anotherme-windows/frontend
          npm ci

      - name: Build Windows App
        run: |
          cd anotherme-windows
          wails build -clean -o AnotherMe.exe
        env:
          CGO_ENABLED: 1

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist
          Copy-Item "anotherme-windows\build\bin\AnotherMe.exe" "dist\AnotherMe-${{ github.ref_name }}-windows-amd64.exe"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/*

  # ── Create GitHub Release ──
  publish:
    needs: [release-macos, release-cli, release-windows]
    # Don't block on Windows since it's optional
    if: always() && needs.release-macos.result == 'success' && needs.release-cli.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-dmg
          path: release-assets

      - name: Download CLI artifacts
        uses: actions/download-artifact@v4
        with:
          name: cli-binaries
          path: release-assets

      - name: Download Windows artifact (optional)
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: windows-exe
          path: release-assets

      - name: Generate checksums
        run: |
          cd release-assets
          # Remove CLI-specific checksums (will regenerate unified one)
          rm -f checksums-cli.txt
          sha256sum * > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
